profile_intro:
  en: >
    I am an undergraduate student in computational mathematics at USTC. My interests lie at the intersection of applied mathematics,
    artificial intelligence, computer vision, and computer graphics, with a current focus on dynamic 3D reconstruction, neural rendering,
    physics-informed deformable modeling, optimization, inverse problems, scientific computing, and AI for Science.
  zh: >
    我是中国科学技术大学计算数学方向本科生，研究兴趣集中在应用数学、人工智能、计算机视觉与计算机图形学的交叉问题，
    目前关注动态三维重建、神经渲染、物理约束的可变形建模、优化与反问题、科学计算及 AI4Science。

